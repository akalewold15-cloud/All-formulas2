<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro X - AA Company</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1P0G3VZPB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1P0G3VZPB');
    </script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: radial-gradient(circle at top, #001f3f 0%, #000000 85%);
            --accent: #00d4ff;
            --glass: rgba(255, 255, 255, 0.04);
            --glow: 0 0 15px rgba(0, 212, 255, 0.6);
            --neon-text: 0 0 12px rgba(0, 212, 255, 0.9);
        }

        body, html { margin: 0; padding: 0; min-height: 100vh; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        .page { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; background: var(--bg-color); padding-bottom: 60px; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.7s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 1. SPLASH SCREEN (3D SPIN) --- */
        .splash-screen { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: black; position: fixed; z-index: 999; }
        .aa-spin {
            font-size: 110px; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 40px var(--accent);
            animation: spinDrop 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes spinDrop {
            0% { transform: translateY(-600px) rotateY(0deg) scale(0.4); opacity: 0; }
            60% { transform: translateY(30px) rotateY(1080deg) scale(1.1); opacity: 1; }
            100% { transform: translateY(0) rotateY(1800deg) scale(1); }
        }

        /* --- 2. HEADER & NAVIGATION --- */
        .header { margin-top: 50px; text-align: center; width: 100%; }
        .header h1 { font-weight: 200; letter-spacing: 6px; margin: 0; text-shadow: var(--neon-text); font-size: 2.2rem; }
        .company-tag { font-size: 0.65rem; letter-spacing: 4px; opacity: 0.5; margin-bottom: 15px; }
        
        .join-btn {
            display: inline-block; padding: 12px 30px; border-radius: 30px;
            border: 1px solid var(--accent); background: rgba(0, 212, 255, 0.1);
            color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: bold;
            box-shadow: var(--glow); transition: 0.3s; margin-bottom: 20px;
        }
        .join-btn:hover { background: var(--accent); color: black; }

        /* --- 3. DASHBOARD GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 92%; max-width: 450px; margin-top: 10px; }
        
        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
            padding: 25px 15px; border-radius: 20px; text-align: center;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            font-size: 0.9rem; font-weight: 600; letter-spacing: 1.5px; cursor: pointer; transition: 0.4s;
        }
        .card:active { transform: scale(0.92); border-color: var(--accent); box-shadow: var(--glow); }
        .full-card { grid-column: span 2; border: 1px dashed rgba(0, 212, 255, 0.4); }

        .section-label { width: 90%; max-width: 450px; margin: 35px 0 8px 0; font-size: 0.75rem; letter-spacing: 4px; opacity: 0.4; text-align: left; text-transform: uppercase; }

        /* --- 4. FORMULA LIBRARY STYLE --- */
        .content-container { width: 92%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .formula-box {
            background: rgba(0,0,0,0.3); border-left: 4px solid var(--accent);
            padding: 20px; border-radius: 12px; animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .formula-box h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .formula-item { margin-bottom: 12px; }
        .formula-item code { display: block; font-size: 1.3rem; color: white; text-shadow: var(--neon-text); margin: 5px 0; font-family: 'Courier New', Courier, monospace; }
        .formula-item small { color: #aaa; font-size: 0.8rem; }

        /* --- 5. CALCULATOR --- */
        .input-group { width: 100%; margin: 15px 0; }
        .input-field {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; color: white; border-radius: 15px; font-size: 1.1rem;
            margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        .input-field:focus { border-color: var(--accent); }
        .calc-btn {
            width: 100%; padding: 18px; border-radius: 15px; background: var(--accent);
            color: black; font-weight: 800; border: none; font-size: 1.1rem; cursor: pointer; box-shadow: var(--glow);
        }
        .res-display { font-size: 2rem; margin-top: 20px; color: var(--accent); text-shadow: var(--neon-text); font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash" class="splash-screen">
        <div class="aa-spin">AA</div>
    </div>

    <div id="home" class="page">
        <div class="header">
            <h1>PRO X</h1>
            <div class="company-tag">AA COMPANY - INNOVATION</div>
            <a href="https://t.me/smart_kihilot" target="_blank" class="join-btn">JOIN CHANNEL (ተቀላቀሉ)</a>
        </div>

        <div class="section-label">Subjects (የትምህርት ዘርፎች)</div>
        <div class="grid">
            <div class="card" onclick="openSubject('physics')">PHYSICS</div>
            <div class="card" onclick="openSubject('maths')">MATHS</div>
            <div class="card" onclick="openSubject('chemistry')">CHEMISTRY</div>
            <div class="card" onclick="openSubject('astronomy')">ASTRONOMY</div>
        </div>

        <div class="section-label">Smart Tools (መሳሪያዎች)</div>
        <div class="grid">
            <div class="card full-card" onclick="showPage('forceCalcPage')">🛠 FORCE CALCULATOR</div>
            <div class="card full-card" onclick="showPage('unitCalcPage')">🛠 UNIT CONVERTER</div>
        </div>
    </div>

    <div id="physicsPage" class="page">
        <div class="header"><h1>PHYSICS</h1></div>
        <div class="content-container" id="physicsList"></div>
        <div class="card" style="width: 80%; margin-top: 40px; border-color: red;" onclick="showPage('home')">BACK</div>
    </div>

    <div id="mathsPage" class="page">
        <div class="header"><h1>MATHS</h1></div>
        <div class="content-container" id="mathsList"></div>
        <div class="card" style="width: 80%; margin-top: 40px; border-color: red;" onclick="showPage('home')">BACK</div>
    </div>

    <div id="chemistryPage" class="page">
        <div class="header"><h1>CHEMISTRY</h1></div>
        <div class="content-container" id="chemistryList"></div>
        <div class="card" style="width: 80%; margin-top: 40px; border-color: red;" onclick="showPage('home')">BACK</div>
    </div>

    <div id="forceCalcPage" class="page">
        <div class="header"><h1>FORCE CALC</h1></div>
        <div class="content-container">
            <div class="input-group">
                <input type="number" id="mass" class="input-field" placeholder="Mass (kg)">
                <input type="number" id="acc" class="input-field" placeholder="Acceleration (m/s²)">
                <button class="calc-btn" onclick="runForceCalc()">CALCULATE</button>
            </div>
            <div id="forceResult" class="res-display">0 N</div>
        </div>
        <div class="card" style="width: 80%; margin-top: 20px;" onclick="showPage('home')">BACK</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';

        const DATA = {
            physics: [
                {t: "Motion (ዩኒት 1)", f: "v = u + at", d: "Final Velocity Calculation"},
                {t: "Motion (ዩኒት 1)", f: "s = ut + ½at²", d: "Displacement"},
                {t: "Newton's 2nd Law", f: "F = m × a", d: "Force = Mass × Acceleration"},
                {t: "Momentum", f: "p = m × v", d: "Momentum = Mass × Velocity"},
                {t: "Work Done", f: "W = F × d", d: "Work = Force × Distance"},
                {t: "Power", f: "P = W / t", d: "Power = Work / Time"},
                {t: "Kinetic Energy", f: "KE = ½mv²", d: "Energy of Motion"},
                {t: "Potential Energy", f: "PE = mgh", d: "Stored Energy"},
                {t: "Heat Energy", f: "Q = mc∆T", d: "Heat Transfer"},
                {t: "Electricity", f: "V = I × R", d: "Ohm's Law"},
                {t: "Electrical Power", f: "P = V × I", d: "Power in Watts"},
                {t: "Transformers", f: "Vp/Vs = Np/Ns", d: "Voltage/Turns Ratio"}
            ],
            maths: [
                {t: "Polynomials", f: "P(x) = anxⁿ + ... + a₀", d: "General Form"},
                {t: "Quadratic Formula", f: "x = [-b ± √(b²-4ac)] / 2a", d: "Finding Roots"},
                {t: "Logarithms", f: "log(xy) = log x + log y", d: "Product Rule"},
                {t: "Logarithms", f: "log(x/y) = log x - log y", d: "Quotient Rule"},
                {t: "Trigonometry", f: "sin²θ + cos²θ = 1", d: "Identity Rule"},
                {t: "Circles", f: "A = πr²", d: "Area of a Circle"},
                {t: "Circles", f: "C = 2πr", d: "Circumference"},
                {t: "Cylinder Volume", f: "V = πr²h", d: "Volume Calculation"}
            ],
            chemistry: [
                {t: "Mole Concept", f: "n = m / M", d: "Mole = mass / molar mass"},
                {t: "Density", f: "ρ = m / V", d: "Density = Mass / Volume"},
                {t: "Ideal Gas Law", f: "PV = nRT", d: "Pressure, Volume, Temp relation"},
                {t: "Boyle's Law", f: "P₁V₁ = P₂V₂", d: "Constant Temperature"},
                {t: "Charles's Law", f: "V₁/T₁ = V₂/T₂", d: "Constant Pressure"}
            ],
            astronomy: [
                {t: "Universal Gravity", f: "F = G(m₁m₂/r²)", d: "Newton's Gravitational Law"},
                {t: "Kepler's 3rd Law", f: "T² ∝ r³", d: "Orbital Period Relation"}
            ]
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                showPage('home');
            }, 2500);
        };

        function openSubject(sub) {
            const container = document.getElementById(sub + 'List');
            container.innerHTML = "";
            DATA[sub].forEach(item => {
                container.innerHTML += `
                    <div class="formula-box">
                        <h3>${item.t}</h3>
                        <div class="formula-item">
                            <small>${item.d}</small>
                            <code>${item.f}</code>
                        </div>
                    </div>
                `;
            });
            showPage(sub + 'Page');
        }

        function runForceCalc() {
            const m = document.getElementById('mass').value;
            const a = document.getElementById('acc').value;
            if(m && a) {
                document.getElementById('forceResult').innerText = (m * a).toFixed(2) + " N";
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
    </script>
</body>
</html>
