<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro X - AA Company</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1P0G3VZPB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1P0G3VZPB');
    </script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg: radial-gradient(circle at top, #001a33 0%, #000000 80%);
            --accent: #00d4ff;
            --glass: rgba(255, 255, 255, 0.05);
            --glow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        .page { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; background: var(--bg); }
        .active { display: flex; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* AA 360 Spin Drop */
        .aa-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: black; position: fixed; width: 100%; z-index: 100; }
        .aa-text {
            font-size: 100px; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 30px var(--accent);
            animation: spinDrop 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes spinDrop {
            0% { transform: translateY(-500px) rotateY(0deg); opacity: 0; }
            60% { transform: translateY(20px) rotateY(720deg); opacity: 1; }
            100% { transform: translateY(0) rotateY(1080deg); }
        }

        /* Dashboard Styles */
        .header { margin-top: 40px; text-align: center; }
        .header h1 { font-weight: 200; letter-spacing: 5px; margin: 0; text-shadow: 0 0 10px var(--accent); }
        
        .join-btn {
            margin-top: 15px; padding: 10px 25px; border-radius: 20px;
            border: 1px solid var(--accent); background: rgba(0, 212, 255, 0.1);
            color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: bold;
            transition: 0.3s; box-shadow: var(--glow);
        }

        .search-bar {
            width: 85%; padding: 15px; margin: 30px 0;
            background: var(--glass); border: 1px solid #333;
            border-radius: 12px; color: white; outline: none;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }

        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 15px; text-align: center;
            backdrop-filter: blur(10px); transition: 0.3s;
            font-size: 0.8rem; font-weight: bold; letter-spacing: 1px;
        }
        .card:active { transform: scale(0.95); border-color: var(--accent); box-shadow: var(--glow); }

        .full-card { grid-column: span 2; border: 1px dashed var(--accent); }

        .section-title { width: 90%; margin: 25px 0 10px 0; font-size: 0.7rem; letter-spacing: 3px; opacity: 0.6; }

    </style>
</head>
<body>

    <div id="splash" class="aa-container">
        <div class="aa-text">AA</div>
    </div>

    <div id="home" class="page">
        <div class="header">
            <h1>PRO X</h1>
            <p style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">AA COMPANY</p>
            <a href="https://t.me/smart_kihilot" class="join-btn">JOIN CHANNEL</a>
        </div>

        <input type="text" class="search-bar" placeholder="🔍 Search Formulas or Tools...">

        <div class="section-title">CORE FORMULAS</div>
        <div class="grid">
            <div class="card" onclick="alert('Physics Library Loading...')">PHYSICS</div>
            <div class="card" onclick="alert('Maths Library Loading...')">MATHS</div>
            <div class="card">CHEMISTRY</div>
            <div class="card">BIOLOGY</div>
        </div>

        <div class="section-title">ADVANCED TOOLS</div>
        <div class="grid">
            <div class="card full-card" onclick="showPage('forceCalc')">🛠 FORCE CALCULATOR (F=ma)</div>
            <div class="card full-card">🛠 QUADRATIC EQUATION SOLVER</div>
            <div class="card full-card">🛠 MOLAR MASS CALCULATOR</div>
        </div>

        <div class="section-title">PERSONAL SPACE</div>
        <div class="grid" style="margin-bottom: 50px;">
            <div class="card" style="background: rgba(0,212,255,0.05);">CREATE NOTE</div>
            <div class="card">MY NOTES</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            else document.getElementById('home').classList.add('active');
        }

        // Auto transition from Splash to Home
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            showPage('home');
        }, 3000);

        // Haptic Feedback for buttons
        document.querySelectorAll('.card').forEach(btn => {
            btn.addEventListener('click', () => {
                tg.HapticFeedback.impactOccurred('light');
            });
        });
    </script>
</body>
</html>
