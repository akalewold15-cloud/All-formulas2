<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro X - AA Company</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1P0G3VZPB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1P0G3VZPB');
    </script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: radial-gradient(circle at 50% -20%, #003366 0%, #000000 80%);
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glow: 0 0 20px rgba(0, 242, 255, 0.4);
            --neon-text: 0 0 15px rgba(0, 242, 255, 1);
        }

        body, html { margin: 0; padding: 0; min-height: 100vh; background: #000; color: white; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

        .page { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; background: var(--bg-color); padding-bottom: 50px; }
        .active { display: flex; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        /* --- ADVANCED SPLASH SCREEN --- */
        .splash { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: black; position: fixed; z-index: 1000; flex-direction: column; }
        
        .ring {
            width: 200px; height: 200px; border: 2px solid transparent; border-top: 2px solid var(--accent);
            border-radius: 50%; position: absolute; animation: ringSpin 2s linear infinite;
        }
        @keyframes ringSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .aa-box {
            position: relative; text-align: center;
            animation: aaEntrance 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .aa-logo { font-size: 80px; font-weight: 900; color: var(--accent); text-shadow: var(--neon-text); margin: 0; }
        .aa-sub { font-size: 10px; letter-spacing: 8px; opacity: 0.7; color: white; margin-top: -10px; }

        @keyframes aaEntrance {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(360deg); opacity: 1; }
            100% { transform: scale(1) rotate(720deg); }
        }

        /* --- MAIN UI --- */
        .header { margin-top: 60px; text-align: center; }
        .header h1 { font-weight: 100; letter-spacing: 8px; font-size: 2.5rem; margin: 0; color: white; text-shadow: var(--neon-text); }
        
        .join-btn {
            display: inline-block; margin-top: 20px; padding: 12px 35px; border-radius: 50px;
            background: linear-gradient(45deg, #001a33, #003366); border: 1px solid var(--accent);
            color: var(--accent); text-decoration: none; font-size: 0.7rem; font-weight: bold;
            box-shadow: var(--glow); text-transform: uppercase; letter-spacing: 2px;
        }

        .container { width: 90%; max-width: 450px; margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .tech-card {
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 30px 15px; border-radius: 24px; text-align: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .tech-card:active { transform: translateY(5px); background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }
        .tech-card span { display: block; font-size: 0.75rem; letter-spacing: 3px; opacity: 0.6; margin-bottom: 10px; }
        .tech-card h3 { margin: 0; font-size: 0.9rem; font-weight: 800; color: white; }

        .full { grid-column: span 2; border: 1px solid rgba(255,255,255,0.1); }

        /* --- CONTENT VIEW --- */
        .content-view { width: 90%; max-width: 500px; margin-top: 30px; }
        .formula-item {
            background: rgba(255,255,255,0.02); border-left: 2px solid var(--accent);
            padding: 20px; margin-bottom: 15px; border-radius: 0 15px 15px 0;
            animation: fadeInItem 0.5s ease forwards;
        }
        @keyframes fadeInItem { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .formula-item h4 { margin: 0; font-size: 0.7rem; color: var(--accent); opacity: 0.8; text-transform: uppercase; }
        .formula-item p { margin: 10px 0 0 0; font-size: 1.4rem; font-family: 'Courier New', Courier, monospace; text-shadow: var(--neon-text); }

        /* --- CALCULATOR --- */
        .calc-box { width: 90%; max-width: 400px; text-align: center; }
        .input-tech {
            width: 100%; padding: 20px; background: rgba(0,0,0,0.4); border: 1px solid #1a1a1a;
            color: white; border-radius: 15px; font-size: 1.2rem; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }
        .input-tech:focus { border-color: var(--accent); box-shadow: var(--glow); }
        .btn-calc {
            width: 100%; padding: 20px; background: var(--accent); color: black;
            border: none; border-radius: 15px; font-weight: 900; font-size: 1rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash" class="splash">
        <div class="ring"></div>
        <div class="aa-box">
            <h1 class="aa-logo">AA</h1>
            <p class="aa-sub">COMPANY</p>
        </div>
    </div>

    <div id="home" class="page">
        <div class="header">
            <h1>PRO X</h1>
            <a href="https://t.me/smart_kihilot" target="_blank" class="join-btn">Join Telegram Channel</a>
        </div>

        <div class="container">
            <div class="tech-card" onclick="loadSubject('physics')">
                <span>MODULE 01</span>
                <h3>PHYSICS</h3>
            </div>
            <div class="tech-card" onclick="loadSubject('maths')">
                <span>MODULE 02</span>
                <h3>MATHS</h3>
            </div>
            <div class="tech-card" onclick="loadSubject('chemistry')">
                <span>MODULE 03</span>
                <h3>CHEMISTRY</h3>
            </div>
            <div class="tech-card" onclick="loadSubject('astronomy')">
                <span>MODULE 04</span>
                <h3>ASTRONOMY</h3>
            </div>
            <div class="tech-card full" onclick="showPage('forcePage')">
                <span>UTILITY</span>
                <h3>FORCE CALCULATOR</h3>
            </div>
        </div>
    </div>

    <div id="subjectPage" class="page">
        <div class="header"><h1 id="subjectTitle">SUBJECT</h1></div>
        <div id="formulaContainer" class="content-view"></div>
        <div class="join-btn" onclick="showPage('home')" style="margin-top: 30px; border-color: #ff4d4d; color: #ff4d4d;">EXIT TO DASHBOARD</div>
    </div>

    <div id="forcePage" class="page">
        <div class="header"><h1>SOLVER</h1></div>
        <div class="calc-box">
            <p style="opacity: 0.5; font-size: 0.8rem; margin-bottom: 20px;">Newton's Second Law Calculator</p>
            <input type="number" id="mass" class="input-tech" placeholder="Mass (kg)">
            <input type="number" id="acc" class="input-tech" placeholder="Acceleration (m/s²)">
            <button class="btn-calc" onclick="runCalc()">RUN SIMULATION</button>
            <h2 id="forceRes" style="margin-top: 30px; font-size: 3rem; text-shadow: var(--neon-text);">0 N</h2>
        </div>
        <div class="join-btn" onclick="showPage('home')" style="margin-top: 30px;">BACK</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';

        const LIBRARY = {
            physics: [
                {h: "Equation of Motion", f: "v = u + at"},
                {h: "Displacement", f: "s = ut + ½at²"},
                {h: "Newton's 2nd Law", f: "F = m × a"},
                {h: "Momentum", f: "p = m × v"},
                {h: "Work Done", f: "W = F × d"},
                {h: "Kinetic Energy", f: "KE = ½mv²"},
                {h: "Heat Energy", f: "Q = mc∆T"},
                {h: "Ohm's Law", f: "V = I × R"}
            ],
            maths: [
                {h: "Quadratic Formula", f: "x = [-b ± √(b²-4ac)]/2a"},
                {h: "Logarithm Product", f: "log(xy) = log x + log y"},
                {h: "Circle Area", f: "A = πr²"},
                {h: "Trig Identity", f: "sin²θ + cos²θ = 1"},
                {h: "Cylinder Volume", f: "V = πr²h"}
            ],
            chemistry: [
                {h: "Mole Formula", f: "n = m / M"},
                {h: "Ideal Gas Law", f: "PV = nRT"},
                {h: "Density", f: "ρ = m / V"},
                {h: "Boyle's Law", f: "P₁V₁ = P₂V₂"}
            ],
            astronomy: [
                {h: "Universal Gravity", f: "F = G(m₁m₂/r²)"},
                {h: "Kepler's 3rd Law", f: "T² ∝ r³"}
            ]
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                showPage('home');
            }, 3000);
        };

        function loadSubject(sub) {
            document.getElementById('subjectTitle').innerText = sub.toUpperCase();
            const container = document.getElementById('formulaContainer');
            container.innerHTML = "";
            LIBRARY[sub].forEach(item => {
                container.innerHTML += `
                    <div class="formula-item">
                        <h4>${item.h}</h4>
                        <p>${item.f}</p>
                    </div>
                `;
            });
            showPage('subjectPage');
        }

        function runCalc() {
            const m = document.getElementById('mass').value;
            const a = document.getElementById('acc').value;
            if(m && a) {
                document.getElementById('forceRes').innerText = (m * a).toFixed(1) + " N";
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
    </script>
</body>
</html>
