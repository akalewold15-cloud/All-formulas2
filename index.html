<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-Formulas Pro | Akalewold</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --accent: #ff9800; --bg: #f0f2f5; }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); }

        /* Header & Avatar */
        header { 
            background: linear-gradient(135deg, #1a237e, #3949ab); color: white; 
            padding: 10px 15px; position: sticky; top: 0; z-index: 1000; 
            display: flex; align-items: center; justify-content: space-between; 
        }
        .avatar-circle { 
            width: 40px; height: 40px; background: var(--accent); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; border: 2px solid white; 
        }

        /* Subject Grid - 2 Columns */
        .subject-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 10px; padding: 15px; 
        }
        .subject-card { 
            background: white; padding: 20px; border-radius: 15px; 
            text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            cursor: pointer; transition: 0.3s;
        }
        .subject-card:hover { transform: scale(1.03); }
        .subj-icon { font-size: 25px; display: block; margin-bottom: 5px; }

        /* Formula Page */
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .page-section { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        
        .formula-card { 
            background: white; padding: 15px; border-radius: 12px; 
            margin-bottom: 12px; border-left: 5px solid var(--primary); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .formula-box { 
            background: #f8f9fa; padding: 10px; border-radius: 8px; 
            font-family: 'Courier New', monospace; color: #c62828; 
            font-size: 15px; margin-top: 10px; overflow-x: auto;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn { background: none; border: none; color: var(--primary); font-weight: bold; cursor: pointer; padding: 10px 0; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 20px; cursor: pointer;" onclick="showPage('home')">☰</div>
        <div style="font-weight: 600;">All-Formulas Pro</div>
        <div class="avatar-circle" id="userInitial">A</div>
    </header>

    <div class="container">
        <section id="page-home" class="page-section active">
            <div style="background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center;">
                <h2 style="margin:0;">ሰላም <span id="uName">Akalewold</span>!</h2>
                <p style="color: #666; font-size: 14px;">ከ 1,300 በላይ ፎርሙላዎች ዝግጁ ናቸው</p>
            </div>
            
            <div class="subject-grid">
                <div class="subject-card" onclick="showPage('math')"><span class="subj-icon">📐</span>Math</div>
                <div class="subject-card" onclick="showPage('physics')"><span class="subj-icon">⚡</span>Physics</div>
                <div class="subject-card" onclick="showPage('chemistry')"><span class="subj-icon">🧪</span>Chemistry</div>
                <div class="subject-card" onclick="showPage('biology')"><span class="subj-icon">🧬</span>Biology</div>
                <div class="subject-card" onclick="showPage('civics')"><span class="subj-icon">⚖️</span>Civics</div>
                <div class="subject-card" onclick="showPage('geography')"><span class="subj-icon">🌍</span>Geography</div>
            </div>
        </section>

        <section id="page-content" class="page-section">
            <button class="back-btn" onclick="showPage('home')">← Back to Dashboard</button>
            <h2 id="sectionTitle" style="color: var(--primary);">Subject</h2>
            <div id="formulaList"></div>
        </section>
    </div>

    <script>
        const studentName = "Akalewold"; 
        document.getElementById('userInitial').innerText = studentName[0];
        document.getElementById('uName').innerText = studentName;

        // ከመጽሐፍህ የተወሰዱ አንዳንድ ፎርሙላዎች
        const data = {
            math: [
                {t: "Special Product", f: "(a + b)² = a² + 2ab + b²"},
                {t: "Difference of Squares", f: "a² - b² = (a - b)(a + b)"},
                {t: "Quadratic Formula", f: "x = [-b ± √(b² - 4ac)] / 2a"},
                {t: "Logarithm Product", f: "log_a(MN) = log_a M + log_a N"},
                {t: "Circle Area", f: "A = πr²"}
            ],
            physics: [
                {t: "Newton's 2nd Law", f: "F = ma"},
                {t: "Work", f: "W = Fd cos θ"},
                {t: "Ohm's Law", f: "V = IR"},
                {t: "Power", f: "P = VI = I²R"}
            ],
            chemistry: [
                {t: "Ideal Gas Law", f: "PV = nRT"},
                {t: "Molarity", f: "M = n / V"},
                {t: "Mole Calculation", f: "n = m / M"}
            ]
        };

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            if(id === 'home') {
                document.getElementById('page-home').classList.add('active');
            } else {
                document.getElementById('page-content').classList.add('active');
                renderFormulas(id);
            }
        }

        function renderFormulas(subj) {
            document.getElementById('sectionTitle').innerText = subj.toUpperCase();
            let html = "";
            let list = data[subj] || [{t: "Coming Soon", f: "Adding more formulas..."}];
            list.forEach(item => {
                html += `<div class="formula-card"><b>${item.t}</b><div class="formula-box">${item.f}</div></div>`;
            });
            document.getElementById('formulaList').innerHTML = html;
        }
    </script>
</body>
</html>
