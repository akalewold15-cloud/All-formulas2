<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA - All Formulas</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ቀለሞች */
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --math-color: #ff4757;
            --phys-color: #1e90ff;
            --chem-color: #2ed573;
            --bg-light: #f1f2f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* 1. Splash Screen */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: var(--primary-grad);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease-out;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: pulse 2s infinite;
        }

        .logo-text {
            font-size: 50px;
            font-weight: bold;
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 2. Main Content */
        .header {
            background: var(--primary-grad);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
        }

        .search-container {
            margin: -25px 20px 20px;
        }

        .search-container input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            overflow-x: auto;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 15px;
            background: white;
            white-space: nowrap;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }

        .tab.active { background: #764ba2; color: white; }

        /* Colorful Cards */
        .container { padding: 20px; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 6px; height: 100%;
        }

        .card.math::before { background: var(--math-color); }
        .card.phys::before { background: var(--phys-color); }
        .card.chem::before { background: var(--chem-color); }

        .formula-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2em;
            text-align: center;
            margin: 10px 0;
            color: #2c3e50;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="logo-circle">
            <span class="logo-text">AA</span>
        </div>
        <p style="color: white; margin-top: 20px; font-weight: 300;">Formula Finder v2.0</p>
    </div>

    <!-- Main App -->
    <div class="header">
        <h1>All Formulas</h1>
        <p>በቀላሉ ቀመሮችን ያግኙ</p>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="ቀመር ይፈልጉ..." onkeyup="search()">
    </div>

    <div class="tabs">
        <div class="tab active" onclick="filter('all')">ሁሉንም</div>
        <div class="tab" style="color:var(--math-color)" onclick="filter('math')">ሒሳብ</div>
        <div class="tab" style="color:var(--phys-color)" onclick="filter('phys')">ፊዚክስ</div>
        <div class="tab" style="color:var(--chem-color)" onclick="filter('chem')">ኬሚስትሪ</div>
    </div>

    <div class="container" id="list">
        <!-- Math -->
        <div class="card math" data-cat="math">
            <h3 style="color:var(--math-color)">Triangle Area</h3>
            <div class="formula-box">A = ½ × b × h</div>
            <p>የሶስት ማዕዘን ስፋት መፈለጊያ</p>
        </div>

        <!-- Physics -->
        <div class="card phys" data-cat="phys">
            <h3 style="color:var(--phys-color)">Work Done</h3>
            <div class="formula-box">W = F × d</div>
            <p>ስራ = ጉልበት × ርቀት</p>
        </div>

        <!-- Chemistry -->
        <div class="card chem" data-cat="chem">
            <h3 style="color:var(--chem-color)">Molarity</h3>
            <div class="formula-box">M = n / V</div>
            <p>ሞላሪቲ = የሞል መጠን / ይዘት</p>
        </div>
    </div>

    <script>
        // Splash Screen መጥፊያ (ከ 2 ሰከንድ በኋላ)
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        }, 2500);

        // የቴሌግራም WebApp ዝግጁነት
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        // ፍለጋ
        function search() {
            let val = document.getElementById('search').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(c => {
                let txt = c.innerText.toLowerCase();
                c.style.display = txt.includes(val) ? "block" : "none";
            });
        }

        // ማጣሪያ (Tabs)
        function filter(cat) {
            let cards = document.querySelectorAll('.card');
            cards.forEach(c => {
                if(cat === 'all' || c.getAttribute('data-cat') === cat) {
                    c.style.display = "block";
                } else {
                    c.style.display = "none";
                }
            });
            // Tab style መቀየር
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
