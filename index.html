<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA COMPANY | Smart Bot</title>
    <meta name="google-site-verification" content="googleca8d7aaa73b08a00.html"> <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
            color: white;
            overflow-x: hidden;
        }

        /* 1. Splash Screen - ፈዝዞ የሚጠፋው መክፈቻ */
        #splash {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid var(--glass);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. Main Dashboard */
        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Icon Grid - ሚያሳብዱ አይኮኖች */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .icon-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon-card:active { transform: scale(0.9); }
        .icon-card i { font-size: 30px; display: block; margin-bottom: 5px; }

        /* Bot Chat Box */
        .chat-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            min-height: 100px;
            border-left: 4px solid var(--primary);
            margin-bottom: 20px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--glass);
            color: white;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader"></div>
        <h2 style="margin-top: 20px; letter-spacing: 5px;">AA COMPANY</h2>
    </div>

    <div class="container">
        <div class="header">
            <h1>AA SMART BOT 🚀</h1>
            <p>እንኳን ደህና መጡ! ምን ልርዳዎት?</p>
        </div>

        <div class="icon-grid">
            <div class="icon-card" onclick="reply('start')" style="background: rgba(108, 92, 231, 0.2);">
                <i>🚀</i> <span>Start</span>
            </div>
            <div class="icon-card" onclick="reply('math')" style="background: rgba(0, 206, 201, 0.2);">
                <i>📐</i> <span>Maths</span>
            </div>
            <div class="icon-card" onclick="reply('physics')" style="background: rgba(253, 121, 168, 0.2);">
                <i>⚛️</i> <span>Physics</span>
            </div>
            <div class="icon-card" onclick="reply('help')" style="background: rgba(255, 234, 167, 0.2);">
                <i>❓</i> <span>Help</span>
            </div>
            <div class="icon-card" style="background: rgba(85, 239, 196, 0.2);">
                <i>⚙️</i> <span>Settings</span>
            </div>
            <div class="icon-card" onclick="window.location.reload()" style="background: rgba(250, 177, 160, 0.2);">
                <i>🔄</i> <span>Refresh</span>
            </div>
        </div>

        <div class="chat-box" id="botBox">
            <b>AA BOT:</b> ሰላም! እኔን ለመጀመር Start የሚለውን ይጫኑ ወይም ጥያቄዎን ከታች ይጻፉ።
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="መልእክት እዚህ ይጻፉ...">
            <button onclick="reply('text')">ላክ</button>
        </div>
    </div>

    <script>
        // 1. Splash Screen ማጥፊያ
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.visibility = 'hidden', 1000);
            }, 2500); // 2.5 ሰከንድ ቆይቶ ይጠፋል
        };

        // 2. የቦቱ መልስ (Logic)
        function reply(type) {
            const box = document.getElementById('botBox');
            const input = document.getElementById('userInput');
            
            if (type === 'start') {
                box.innerHTML = "<b>AA BOT:</b> 🚀 እንኳን ደህና መጡ! እኔ የ AA Company ረዳት ነኝ። ፎርሙላዎችን ለማግኘት አይኮኖቹን ይጠቀሙ።";
            } else if (type === 'math') {
                box.innerHTML = "<b>AA BOT:</b> 📐 የሂሳብ ፎርሙላዎች ዝግጁ ናቸው! የትኛውን ክፍል ማየት ይፈልጋሉ?";
            } else if (type === 'physics') {
                box.innerHTML = "<b>AA BOT:</b> ⚛️ ፊዚክስ! $F = m \times a$ እና ሌሎችም ፎርሙላዎች እዚህ አሉ።";
            } else if (type === 'help') {
                box.innerHTML = "<b>AA BOT:</b> ❓ እርዳታ ይፈልጋሉ? ጥያቄዎን ይጻፉልኝ ወይም በ @Akalewold ያግኙኝ።";
            } else if (type === 'text') {
                if (input.value.trim() !== "") {
                    box.innerHTML = "<b>AA BOT:</b> '" + input.value + "' የሚለው መልእክትዎ ደርሶኛል! በቅርቡ እመልስልዎታለሁ።";
                    input.value = "";
                }
            }
        }
    </script>
</body>
</html>
