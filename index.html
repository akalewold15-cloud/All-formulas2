<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro X - AA Company</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1P0G3VZPB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E1P0G3VZPB');
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #00f2ff; /* ይህ በ Firebase ይቀየራል */
            --bg: radial-gradient(circle at 50% 0%, #001f3f 0%, #000000 90%);
        }
        body, html { margin: 0; padding: 0; min-height: 100vh; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* Splash Screen */
        .splash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .ring { width: 200px; height: 200px; border: 4px solid transparent; border-top: 4px solid var(--accent); border-radius: 50%; position: absolute; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .aa-text { font-size: 100px; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px var(--accent); margin: 0; }
        .aa-sub { font-size: 14px; letter-spacing: 10px; opacity: 0.8; text-transform: uppercase; }

        /* Main UI */
        .view { display: none; min-height: 100vh; background: var(--bg); flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; }
        .active { display: flex; }
        .header h1 { letter-spacing: 10px; color: #fff; text-shadow: 0 0 10px var(--accent); }
        .grid { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 30px 10px; border-radius: 25px; text-align: center; cursor: pointer; }
        .card:active { border-color: var(--accent); transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="splash" class="splash">
        <div class="ring"></div>
        <h1 class="aa-text" id="dispTitle">AA</h1>
        <p class="aa-sub" id="dispSub">COMPANY</p>
    </div>

    <div id="home" class="view">
        <div class="header"><h1>PRO X</h1></div>
        <div class="grid">
            <div class="card" onclick="alert('Module Clicked')"><h3>PHYSICS</h3></div>
            <div class="card" onclick="alert('Module Clicked')"><h3>MATHS</h3></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBH-JYi-1nm0rLP4KpB",
            databaseURL: "https://pro-x-66e62-default-rtdb.firebaseio.com/",
            projectId: "pro-x-66e62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ዲዛይኑን ከ Firebase ላይ መሳብ
        db.ref('config').on('value', (snap) => {
            const cfg = snap.val();
            if(cfg) {
                // ቀለሙን መቀየር
                document.documentElement.style.setProperty('--accent', cfg.accent);
                // የSplash ጽሁፍ መቀየር
                document.getElementById('dispTitle').innerText = cfg.splashTitle;
                document.getElementById('dispSub').innerText = cfg.splashSub;
            }
        });

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('home').classList.add('active');
            }, 3000);
        };
    </script>
</body>
</html>
