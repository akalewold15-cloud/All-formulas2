<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>Pro X | Ultimate Command Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00f2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: rgba(10, 12, 18, 0.95); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; color: #888; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--glow); border: 1px solid rgba(0, 242, 255, 0.2); }
        
        /* Main View Container */
        .master-container { flex: 1; display: grid; grid-template-columns: 1fr 400px; padding: 30px; gap: 30px; overflow-y: auto; }
        .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; padding: 30px; backdrop-filter: blur(20px); }
        
        /* Typography */
        h1, h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
        h1 { font-size: 1.2rem; color: var(--glow); margin-bottom: 40px; }
        
        /* Form Elements */
        .field { margin-bottom: 25px; }
        label { display: block; font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px; letter-spacing: 2px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; font-family: inherit; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--glow); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-glow { background: var(--glow); color: #000; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 0 50px rgba(0, 242, 255, 0.5); }

        /* Preview Window (Figma Style) */
        .preview-pane { position: sticky; top: 0; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .mockup { width: 320px; height: 600px; border: 10px solid #111; border-radius: 45px; background: #000; overflow: hidden; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        .pre-splash { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .pre-title { font-family: 'Orbitron', sans-serif; font-size: 60px; line-height: 1; margin: 0; transition: 0.5s; }
        
        /* Data List */
        .data-card { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #111; }
        .action-btns { display: flex; gap: 10px; }
        .del-btn { background: #ff4d4d; border: none; color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>PRO-X OPS</h1>
    <div class="nav-item active" onclick="switchTab('design')">🎨 Branding & UI</div>
    <div class="nav-item" onclick="switchTab('content')">📚 Content Library</div>
    <div class="nav-item" onclick="switchTab('stats')">📊 App Analytics</div>
    <div style="margin-top: auto; font-size: 10px; opacity: 0.3;">SYSTEM STATUS: ONLINE</div>
</div>

<div class="master-container">
    <div id="designTab" class="panel">
        <h2>Visual Identity</h2>
        <div class="field">
            <label>Master Accent Color</label>
            <input type="color" id="accent" value="#00f2ff" oninput="updatePreview()">
        </div>
        <div class="field">
            <label>Splash Main Title</label>
            <input type="text" id="sTitle" value="AA" oninput="updatePreview()">
        </div>
        <div class="field">
            <label>Splash Subtext</label>
            <input type="text" id="sSub" value="COMPANY" oninput="updatePreview()">
        </div>
        <div class="field">
            <label>Animation Style</label>
            <select id="animType">
                <option value="pulse">Cyber Pulse</option>
                <option value="spin">Vortex Spin</option>
                <option value="fade">Ghost Fade</option>
            </select>
        </div>
        <button class="btn btn-glow" onclick="pushConfig()">Deploy Theme Changes 🚀</button>
    </div>

    <div id="contentTab" class="panel" style="display:none;">
        <h2>Content Library</h2>
        <div class="field">
            <label>Select Category</label>
            <select id="category" onchange="fetchCurrentData()">
                <option value="physics">Physics</option>
                <option value="maths">Maths</option>
                <option value="chemistry">Chemistry</option>
            </select>
        </div>
        <div class="field">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g., Einstein Force">
        </div>
        <div class="field">
            <label>Formula / Content</label>
            <textarea id="itemVal" rows="4" placeholder="F = ma"></textarea>
        </div>
        <button class="btn btn-glow" style="background:#2ecc71" onclick="addItem()">Inject Data +</button>
        
        <div id="liveDataList" style="margin-top: 30px;"></div>
    </div>

    <div class="preview-pane">
        <label>LIVE APP SIMULATOR</label>
        <div class="mockup">
            <div class="pre-splash">
                <div id="pRing" style="width:150px; height:150px; border:2px solid transparent; border-top:2px solid #00f2ff; border-radius:50%; position:absolute;"></div>
                <h1 id="pTitle" class="pre-title">AA</h1>
                <p id="pSub" style="letter-spacing:10px; font-size:10px; margin-top:10px;">COMPANY</p>
            </div>
        </div>
        <p style="font-size: 10px; opacity: 0.4;">Changes reflect instantly on user devices</p>
    </div>
</div>

<script>
    // Firebase Setup using your actual keys from image
    const config = {
        apiKey: "AIzaSyBH-JYi-1nm0rLP4KpB",
        databaseURL: "https://pro-x-66e62-default-rtdb.firebaseio.com/",
        projectId: "pro-x-66e62"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    function updatePreview() {
        const color = document.getElementById('accent').value;
        const title = document.getElementById('sTitle').value;
        const sub = document.getElementById('sSub').value;
        
        document.getElementById('pTitle').style.color = color;
        document.getElementById('pTitle').style.textShadow = `0 0 30px ${color}`;
        document.getElementById('pTitle').innerText = title;
        document.getElementById('pSub').innerText = sub;
        document.getElementById('pRing').style.borderTopColor = color;
    }

    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tab + 'Tab').style.display = 'block';
        event.target.classList.add('active');
        if(tab === 'content') fetchCurrentData();
    }

    function pushConfig() {
        db.ref('config').set({
            accent: document.getElementById('accent').value,
            title: document.getElementById('sTitle').value,
            sub: document.getElementById('sSub').value,
            anim: document.getElementById('animType').value
        }).then(() => alert("Mission Successful: Theme Deployed!"));
    }

    function addItem() {
        const cat = document.getElementById('category').value;
        db.ref('data/' + cat).push({
            t: document.getElementById('itemName').value,
            f: document.getElementById('itemVal').value
        }).then(() => {
            document.getElementById('itemName').value = "";
            document.getElementById('itemVal').value = "";
            alert("Data Injected!");
        });
    }

    function fetchCurrentData() {
        const cat = document.getElementById('category').value;
        const list = document.getElementById('liveDataList');
        db.ref('data/' + cat).on('value', snap => {
            list.innerHTML = "<h2>Active Items</h2>";
            snap.forEach(child => {
                list.innerHTML += `
                    <div class="data-card">
                        <div><strong>${child.val().t}</strong></div>
                        <button class="del-btn" onclick="deleteItem('${cat}', '${child.key}')">REMOVE</button>
                    </div>`;
            });
        });
    }

    function deleteItem(cat, id) {
        if(confirm("Confirm Wipe?")) db.ref(`data/${cat}/${id}`).remove();
    }

    window.onload = updatePreview;
</script>
</body>
</html>
