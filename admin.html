<!DOCTYPE html>
<html>
<head>
    <title>Pro X - Admin Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; padding: 20px; text-align: center; }
        input, textarea { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #00f2ff; background: #111; color: #fff; }
        button { background: #00f2ff; color: #000; padding: 15px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>ADMIN CONTROL PANEL</h2>
    <p>ዋናው አፕ ላይ የሚታየውን ጽሁፍ እዚህ ቀይር</p>
    
    <input type="text" id="subject" placeholder="Subject (physics, maths...)">
    <input type="text" id="title" placeholder="Formula Title">
    <textarea id="formula" placeholder="The Formula (e.g. F = ma)"></textarea>
    <textarea id="desc" placeholder="Description"></textarea>
    
    <br>
    <button onclick="saveData()">Update App Now 🚀</button>

    <script>
        // አንተ በላክኸው ምስል መሰረት የተሞላ
        const firebaseConfig = {
            apiKey: "AIzaSyBH-JYi-1nm0rLP4KpB",
            authDomain: "pro-x-66e62.firebaseapp.com",
            projectId: "pro-x-66e62",
            storageBucket: "pro-x-66e62.firebasestorage.app",
            messagingSenderId: "280141521415",
            appId: "1:280141521415:web:b2b76e..."
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveData() {
            const sub = document.getElementById('subject').value.toLowerCase();
            const title = document.getElementById('title').value;
            const formula = document.getElementById('formula').value;
            const desc = document.getElementById('desc').value;

            if(sub && title) {
                db.ref('data/' + sub).push({
                    t: title,
                    f: formula,
                    d: desc
                }).then(() => {
                    alert("በስኬት ተቀይሯል! አፑን ከፍተህ እየው።");
                });
            } else {
                alert("እባክህ Subject እና Title ሙላ!");
            }
        }
    </script>
</body>
</html>
